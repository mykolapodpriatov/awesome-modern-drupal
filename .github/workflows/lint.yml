name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          config: .markdownlint-cli2.yaml
          globs: |
            README.md
            CONTRIBUTING.md
            CHANGELOG.md
            code-of-conduct.md

  entry-lint:
    name: entry-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate entry format and Contents sync
        run: bash scripts/lint-entries.sh

  dead-links:
    name: Check for dead links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --max-retries 3
            --retry-wait-time 2
            --timeout 30
            --accept 200,206,403,429
            --user-agent 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'
            --exclude localhost
            --exclude '^https://github\.com/mykolapodpriatov/awesome-modern-drupal'
            README.md
          fail: true
